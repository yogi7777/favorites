version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: favorites-app
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Berlin}
      DB_HOST: ${DB_HOST:-db}
      DB_USER: ${DB_USER:-favorites}
      DB_PASS: ${DB_PASS:-favorites}
      DB_NAME: ${DB_NAME:-favorites}
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - favorites-net

  web:
    image: nginx:1.27-alpine
    container_name: favorites-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      # Wir speichern die ganze Config in einer Variable
      NGINX_CONF: |
        server {
            listen 80;
            server_name _;
            root /var/www/html;
            index index.php index.html;
            client_max_body_size 20m;
            location /favicons/ { try_files $$uri =404; }
            location / { try_files $$uri $$uri/ /index.php?$$query_string; }
            location ~ \.php$$ {
                include fastcgi_params;
                fastcgi_pass app:9000;
                fastcgi_index index.php;
                fastcgi_param SCRIPT_FILENAME $$document_root$$fastcgi_script_name;
                fastcgi_read_timeout 120s;
            }
            location ~ /\.(?!well-known).* { deny all; }
        }
    # Dieser Befehl schreibt die Variable in die Datei und startet dann Nginx
    command: /bin/sh -c "echo \"$$NGINX_CONF\" > /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"
    volumes:
      - ./:/var/www/html:ro
    depends_on:
      - app
    networks:
      - favorites-net

  db:
    image: mariadb:11.4
    container_name: favorites-db
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Berlin}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootpass}
      MARIADB_DATABASE: ${DB_NAME:-favorites}
      MARIADB_USER: ${DB_USER:-favorites}
      MARIADB_PASSWORD: ${DB_PASS:-favorites}
    volumes:
      - favorites-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - favorites-net

volumes:
  favorites-db-data:

networks:
  favorites-net:
    driver: bridge